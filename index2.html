<!DOCTYPE html>
<html>
<head>
  <title>PNT Transport</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #ff7e5f, #feb47b);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 25px;
      border-radius: 15px;
      width: 300px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(30px);}
      to {opacity: 1; transform: translateY(0);}
    }

    h2 {
      margin-bottom: 15px;
    }

    .inputBox {
      position: relative;
      margin: 15px 0;
    }

    .inputBox input {
      width: 100%;
      padding: 10px;
      border: none;
      border-bottom: 2px solid #ccc;
      outline: none;
      font-size: 14px;
    }

    .inputBox label {
      position: absolute;
      left: 0;
      top: 10px;
      color: #999;
      transition: 0.3s;
    }

    .inputBox input:focus + label,
    .inputBox input:valid + label {
      top: -10px;
      font-size: 12px;
      color: #ff7e5f;
    }

    button {
      margin-top: 15px;
      padding: 10px;
      width: 100%;
      border: none;
      border-radius: 25px;
      background: linear-gradient(135deg, #ff7e5f, #feb47b);
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>

<div class="container">
  <h2>🚚 PNT Transport</h2>

  <div class="inputBox">
    <input type="text" id="name" required>
    <label>Name</label>
  </div>

  <div class="inputBox">
    <input type="text" id="phone" required>
    <label>Phone</label>
  </div>

  <div class="inputBox">
    <input type="text" id="pickup" required>
    <label>Pickup Location</label>
  </div>

  <div class="inputBox">
    <input type="text" id="drop" required>
    <label>Drop Location</label>
  </div>

  <button onclick="send()">Book Now</button>
</div>

<script>
function send(){
var n=document.getElementById("name").value;
var p=document.getElementById("phone").value;
var pi=document.getElementById("pickup").value;
var d=document.getElementById("drop").value;

var msg="Booking:%0AName:"+n+"%0APhone:"+p+"%0APickup:"+pi+"%0ADrop:"+d;

window.open("https://wa.me/9990109968?text="+msg);
}
</script>

</body>
</html>
