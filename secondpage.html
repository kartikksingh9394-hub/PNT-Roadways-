<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Form</title>
  <style>
    /* Full page background */
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* Form container */
    .form-container {
      background: rgba(0,0,0,0.85);
      padding: 50px;
      border-radius: 20px;
      box-shadow: 0 15px 60px rgba(0,0,0,0.7);
      text-align: center;
      max-width: 500px;
      width: 90%;
      position: relative;
    }

    h1 {
      margin-bottom: 30px;
      font-size: 2.5rem;
      text-shadow: 2px 2px 15px rgba(0,0,0,0.7);
    }

    input, textarea {
      width: 100%;
      padding: 15px;
      margin: 12px 0;
      border-radius: 12px;
      border: none;
      font-size: 16px;
    }

    /* Glow submit button */
    .submit-button {
      background: linear-gradient(90deg, #ff416c, #ff4b2b);
      color: white;
      padding: 18px 50px;
      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 15px;
      cursor: pointer;
      box-shadow: 0 8px 35px rgba(255,65,108,0.6);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .submit-button::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, transparent 70%);
      transform: scale(0);
      transition: transform 0.5s;
    }

    .submit-button:hover::after {
      transform: scale(1);
    }

    .submit-button:hover {
      transform: translateY(-5px) scale(1.05);
      box-shadow: 0 12px 45px rgba(255,65,108,0.8);
      background: linear-gradient(90deg, #ff4b2b, #ff416c);
    }

    .submit-button:active {
      transform: translateY(-2px) scale(0.98);
      box-shadow: 0 6px 25px rgba(255,65,108,0.5);
    }

    /* Modal Popup */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      height: 100%;
      width: 100%;
      background: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-content {
      background: rgba(255,255,255,0.95);
      color: #333;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      width: 90%;
      max-width: 450px;
      box-shadow: 0 10px 50px rgba(0,0,0,0.7);
    }

    .modal-content h2 {
      margin-bottom: 20px;
    }

    .close-btn {
      background: #ff416c;
      color: white;
      padding: 12px 30px;
      border: none;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 15px;
    }
  </style>
</head>
<body>

  <div class="form-container">
    <h1>Premium Contact Form</h1>
    <input type="text" placeholder="Your Name" id="name">
    <input type="email" placeholder="Your Email" id="email">
    <textarea placeholder="Your Message" id="message"></textarea>
    <button class="submit-button" onclick="submitForm()">Submit</button>
  </div>

  <!-- Modal Popup -->
  <div class="modal" id="successModal">
    <div class="modal-content">
      <h2>Form Submitted Successfully!</h2>
      <button class="close-btn" onclick="closeModal()">Close</button>
    </div>
  </div>

  <!-- Audio -->
  <audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

  <script>
    function submitForm() {
      // Play sound
      document.getElementById('clickSound').play();
      // Show modal popup
      document.getElementById('successModal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('successModal').style.display = 'none';
    }
  </script>

</body>
</html>
