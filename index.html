<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navin Pro Gaming Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --p: #3b82f6; --s: #10b981; --d: #ef4444; --bg: #020617; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: white; text-align: center; overflow-x: hidden; }
        
        /* Navbar */
        nav { display: flex; justify-content: space-between; padding: 15px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #1e293b; }
        .logo { font-family: 'Orbitron'; color: var(--p); font-size: 1.2rem; text-shadow: 0 0 10px var(--p); }
        .wallet { background: #000; padding: 5px 15px; border-radius: 20px; border: 1px solid var(--s); color: var(--s); font-weight: bold; cursor: pointer; }

        /* Page System */
        .page { display: none; padding: 20px; animation: slide 0.3s ease; }
        .active { display: block; }

        /* Home Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 10px; }
        .card { background: #1e293b; padding: 25px 10px; border-radius: 20px; cursor: pointer; border: 1px solid #334155; transition: 0.2s; }
        .card:active { transform: scale(0.9); }

        /* Game UI */
        .screen { background: #000; height: 250px; border-radius: 20px; margin: 20px auto; border: 2px solid #1e293b; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; max-width: 400px; }
        #multi-val { font-family: 'Orbitron'; font-size: 3.5rem; transition: 0.1s; z-index: 5; }
        
        .controls { max-width: 400px; margin: auto; background: #1e293b; padding: 15px; border-radius: 15px; }
        .bet-input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: none; background: #0f172a; color: white; text-align: center; font-size: 1.1rem; box-sizing: border-box;}
        
        .btn-play { background: var(--s); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-cashout { background: #f59e0b; }

        /* Popups */
        #win-popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); border: 2px solid gold; padding: 30px; border-radius: 20px; z-index: 5000; animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { from { scale: 0; } to { scale: 1; } }
        
        #modal-pay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 6000; }
        .modal-content { background: white; color: black; width: 80%; max-width: 300px; margin: 100px auto; padding: 20px; border-radius: 15px; text-align: center; }

        .back { color: #64748b; cursor: pointer; display: block; margin-bottom: 15px; text-align: left; }
    </style>
</head>
<body onclick="enableAudio()">

    <audio id="snd-start" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
    <audio id="snd-win" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>
    <audio id="snd-lose" src="https://assets.mixkit.co/active_storage/sfx/2004/2004-preview.mp3"></audio>
    <audio id="snd-click" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>

    <nav>
        <div class="logo">NAVIN</div>
        <div class="wallet" onclick="showPay()">₹<span id="balance">500</span> <span style="font-size:0.8rem">+</span></div>
    </nav>

    <div id="win-popup">
        <h1 style="color: gold; margin: 0;">🏆</h1>
        <h2 style="margin: 10px 0;">CONGRATULATIONS!</h2>
        <p id="win-msg" style="font-size: 1.5rem; font-weight: bold; color: var(--s);"></p>
        <button onclick="closeWin()" style="padding: 10px 20px; border-radius: 10px; border: none; background: var(--p); color: white;">Great!</button>
    </div>

    <div id="modal-pay">
        <div class="modal-content">
            <h3>Add Cash</h3>
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=upi://pay?pa=9643629394@paytm&pn=Navin%20Gaming" width="150">
            <p>Paytm: <b>9643629394</b></p>
            <button onclick="addCash(500)" style="background:green; color:white; padding:10px; width:100%; border:none; border-radius:5px;">I've Paid (Add ₹500)</button>
            <p onclick="hidePay()" style="cursor:pointer; color: grey; margin-top:10px;">Close</p>
        </div>
    </div>

    <div id="pg-home" class="page active">
        <h3 style="color:#64748b">Select Game</h3>
        <div class="grid">
            <div class="card" onclick="nav('pg-aviator')">🚀<br>Aviator</div>
            <div class="card" onclick="nav('pg-mines')">💣<br>Mines</div>
            <div class="card" onclick="nav('pg-dice')">🎲<br>Dice</div>
            <div class="card" onclick="nav('pg-wheel')">🎡<br>Wheel</div>
        </div>
    </div>

    <div id="pg-aviator" class="page">
        <span class="back" onclick="nav('pg-home')">← Lobby</span>
        <div class="screen">
            <h1 id="multi-val">1.00x</h1>
            <div id="plane" style="position:absolute; bottom:10px; left:10px; font-size:2.5rem; display:none;">🚀</div>
        </div>
        <div class="controls">
            <input type="number" id="bet-amt" class="bet-input" value="10" placeholder="Enter Bet Amount">
            <button id="btn-action" class="btn-play" onclick="handleAviator()">PLACE BET</button>
        </div>
    </div>

    <script>
        let balance = 500;
        let isRunning = false;
        let gameLoop;
        let currentMulti = 1.00;

        function enableAudio() { document.querySelectorAll('audio').forEach(a => { a.play(); a.pause(); }); }
        function playS(id) { let s = document.getElementById('snd-'+id); s.currentTime=0; s.play(); }

        function nav(id) { playS('click'); document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); }

        function showPay() { document.getElementById('modal-pay').style.display='block'; }
        function hidePay() { document.getElementById('modal-pay').style.display='none'; }
        function addCash(amt) { balance += amt; updateBal(); hidePay(); playS('win'); }
        function updateBal() { document.getElementById('balance').innerText = balance; }

        function closeWin() { document.getElementById('win-popup').style.display='none'; }

        // --- AVIATOR LOGIC ---
        function handleAviator() {
            const btn = document.getElementById('btn-action');
            const txt = document.getElementById('multi-val');
            const plane = document.getElementById('plane');
            const betInput = document.getElementById('bet-amt');
            let bet = parseInt(betInput.value);

            if(!isRunning) {
                if(isNaN(bet) || bet <= 0 || bet > balance) return alert("Sahi bet lagao bhai!");
                
                // START
                balance -= bet; updateBal();
                isRunning = true;
                currentMulti = 1.00;
                let crashPoint = (Math.random() * 4 + 1.1).toFixed(2);
                
                playS('start');
                btn.innerText = "CASH OUT";
                btn.classList.add('btn-cashout');
                plane.style.display = 'block';
                txt.style.color = "white";

                gameLoop = setInterval(() => {
                    currentMulti += 0.04;
                    txt.innerText = currentMulti.toFixed(2) + "x";
                    let move = (currentMulti - 1) * 35;
                    plane.style.transform = `translate(${move}px, -${move}px)`;

                    if(currentMulti >= crashPoint) {
                        clearInterval(gameLoop);
                        isRunning = false;
                        txt.innerText = "CRASHED";
                        txt.style.color = "red";
                        btn.innerText = "PLACE BET";
                        btn.classList.remove('btn-cashout');
                        plane.style.display = 'none';
                        playS('lose');
                    }
                }, 100);
            } else {
                // CASH OUT
                clearInterval(gameLoop);
                isRunning = false;
                let win = Math.floor(bet * currentMulti);
                balance += win; updateBal();
                
                playS('win');
                document.getElementById('win-msg').innerText = "You Won ₹" + win;
                document.getElementById('win-popup').style.display = 'block';
                
                btn.innerText = "PLACE BET";
                btn.classList.remove('btn-cashout');
                plane.style.display = 'none';
            }
        }
    </script>
</body>
</html>
