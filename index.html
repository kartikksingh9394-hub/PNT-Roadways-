<!DOCTYPE html>
<html>
<head>
  <title>PNT ROADWAYS </title>

  <!-- Mobile fit fix -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f0f2f5;
      scroll-behavior: smooth;
    }

    section {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .page1 {
      background: linear-gradient(135deg, #0d6efd, #00c6ff);
      color: white;
      text-align: center;
    }

    .page1 h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .btn {
      padding: 12px 20px;
      background: white;
      color: #0d6efd;
      border-radius: 25px;
      text-decoration: none;
      margin-top: 15px;
      font-weight: bold;
    }

    .page2 {
      background: white;
      text-align: center;
      padding: 20px;
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 8px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 12px;
      width: 90%;
      border: none;
      border-radius: 25px;
      background: #0d6efd;
      color: white;
      font-size: 16px;
    }

    .page3 {
      background: #222;
      color: white;
      text-align: center;
    }
  </style>
</head>

<body>

<!-- PAGE 1 -->
<section class="page1">
  <h1>🚚 PNT ROADWAYS</h1>
  <p>Fast & Safe Delivery Service</p>
  <a href="#book" class="btn">Book Now ↓</a>
</section>

<!-- PAGE 2 -->
<section class="page2" id="book">
  <h2>Book Your Truck</h2>

  <input type="text" id="name" placeholder="Your Name">
  <input type="text" id="phone" placeholder="Phone Number">
  <input type="text" id="pickup" placeholder="Pickup Location">
  <input type="text" id="drop" placeholder="Drop Location">

  <button onclick="send()">Book on WhatsApp</button>
</section>

<!-- PAGE 3 -->
<section class="page3">
  <h2>Contact Us</h2>
  <p>📞 9990109968</p>
  <p>📍 Greater Noida</p>
</section>

<script>
function send(){
var n=document.getElementById("name").value;
var p=document.getElementById("phone").value;
var pi=document.getElementById("pickup").value;
var d=document.getElementById("drop").value;

var msg="Booking:%0AName:"+n+"%0APhone:"+p+"%0APickup:"+pi+"%0ADrop:"+d;

window.open("https://wa.me/919990109968?text="+msg);
}
</script>

</body>
</html>
