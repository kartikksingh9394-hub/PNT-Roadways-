<!DOCTYPE html>
<html>
<head>
  <title>PNT Transport</title>
</head>
<body style="font-family:Arial; text-align:center;">

  <h1>🚚 PNT Transport</h1>
  <p>Safe & Fast Transport Service</p>

  <hr>

  <h2>Book Your Truck</h2>

  <input type="text" id="name" placeholder="Your Name"><br><br>
  <input type="text" id="phone" placeholder="Phone Number"><br><br>
  <input type="text" id="pickup" placeholder="Pickup Location"><br><br>
  <input type="text" id="drop" placeholder="Drop Location"><br><br>

  <button onclick="sendWhatsApp()">Book on WhatsApp</button>

  <hr>

  <p>📞 999010996832</p>
  <p>📍 Greater Noida</p>

  <script>
    function sendWhatsApp() {
      var name = document.getElementById("name").value;
      var phone = document.getElementById("phone").value;
      var pickup = document.getElementById("pickup").value;
      var drop = document.getElementById("drop").value;

      var message = "New Booking:%0A"
        + "Name: " + name + "%0A"
        + "Phone: " + phone + "%0A"
        + "Pickup: " + pickup + "%0A"
        + "Drop: " + drop;

      window.open("https://wa.me/919990109968?text=" + message);
    }
  </script>

</body>
</html>
