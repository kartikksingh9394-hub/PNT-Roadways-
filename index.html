<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navin All-In-One Gaming</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --p: #3b82f6; --s: #10b981; --d: #ef4444; --bg: #020617; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: white; text-align: center; overflow-x: hidden; }
        
        /* Navigation */
        nav { display: flex; justify-content: space-between; padding: 15px; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #1e293b; }
        .logo { font-family: 'Orbitron'; color: var(--p); font-size: 1.2rem; }
        .wallet { background: #000; padding: 5px 15px; border-radius: 20px; border: 1px solid var(--s); color: var(--s); font-weight: bold; }

        /* Page System */
        .page { display: none; padding: 20px; animation: slide 0.3s ease; }
        .active { display: block; }
        @keyframes slide { from { opacity: 0; transform: translateX(50px); } to { opacity: 1; transform: translateX(0); } }

        /* Home Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 10px; }
        .card { background: #1e293b; padding: 30px 10px; border-radius: 20px; cursor: pointer; border: 1px solid #334155; transition: 0.2s; }
        .card:active { transform: scale(0.9); }
        .card i { font-size: 2.5rem; display: block; margin-bottom: 10px; }

        /* Game UI */
        .screen { background: #000; height: 220px; border-radius: 15px; margin: 20px auto; border: 2px solid #1e293b; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; max-width: 400px; }
        .btn-play { background: var(--s); color: white; border: none; padding: 15px; width: 100%; max-width: 400px; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        .back { color: #64748b; cursor: pointer; display: block; margin-bottom: 20px; text-align: left; }

        /* Mines Grid */
        .mines-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 250px; margin: auto; }
        .tile { width: 70px; height: 70px; background: #334155; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; }
    </style>
</head>
<body onclick="initAudio()">

    <audio id="s-click" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
    <audio id="s-win" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>
    <audio id="s-lose" src="https://assets.mixkit.co/active_storage/sfx/2004/2004-preview.mp3"></audio>

    <nav>
        <div class="logo">NAVIN</div>
        <div class="wallet">₹<span id="bal">500</span></div>
    </nav>

    <div id="pg-home" class="page active">
        <h2 style="font-size: 1rem; color: #94a3b8;">Choose Your Game</h2>
        <div class="grid">
            <div class="card" onclick="go('pg-aviator')">🚀<br>Aviator</div>
            <div class="card" onclick="go('pg-mines')">💣<br>Mines</div>
            <div class="card" onclick="go('pg-dice')">🎲<br>Dice</div>
            <div class="card" onclick="go('pg-wheel')">🎡<br>Wheel</div>
        </div>
    </div>

    <div id="pg-aviator" class="page">
        <span class="back" onclick="go('pg-home')">← Back to Lobby</span>
        <div class="screen" id="avi-screen">
            <h1 id="avi-multi" style="font-family:'Orbitron'; font-size: 3rem;">1.00x</h1>
            <div id="avi-plane" style="position:absolute; left:10px; bottom:10px; font-size:2rem; display:none;">🚀</div>
        </div>
        <button id="avi-btn" class="btn-play" onclick="playAviator()">BET ₹10</button>
    </div>

    <div id="pg-mines" class="page">
        <span class="back" onclick="go('pg-home')">← Back</span>
        <h3>Mines (Find Diamond)</h3>
        <div class="mines-grid" id="m-grid">
            </div>
        <p id="m-status" style="margin-top:15px;">Bet: ₹20</p>
        <button id="m-btn" class="btn-play" onclick="startMines()">START MINES</button>
    </div>

    <div id="pg-dice" class="page">
        <span class="back" onclick="go('pg-home')">← Back</span>
        <div class="screen">
            <h1 id="dice-val" style="font-size: 5rem;">🎲</h1>
        </div>
        <button class="btn-play" onclick="rollDice()">ROLL DICE (₹10)</button>
    </div>

    <div id="pg-wheel" class="page">
        <span class="back" onclick="go('pg-home')">← Back</span>
        <div class="screen">
            <div id="wheel-obj" style="font-size: 4rem; transition: 2s ease-out;">🎡</div>
        </div>
        <button class="btn-play" onclick="spinWheel()">SPIN WHEEL (₹20)</button>
    </div>

    <script>
        let balance = 500;
        let running = false;
        let timer;

        // Audio Fix for Mobile
        function initAudio() { document.querySelectorAll('audio').forEach(a => { a.play(); a.pause(); }); }
        function snd(n) { document.getElementById('s-'+n).currentTime=0; document.getElementById('s-'+n).play(); }

        function go(id) {
            snd('click');
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'pg-mines') resetMinesUI();
        }

        function updateBal() { document.getElementById('bal').innerText = balance; }

        // --- AVIATOR LOGIC ---
        function playAviator() {
            let btn = document.getElementById('avi-btn');
            let txt = document.getElementById('avi-multi');
            let plane = document.getElementById('avi-plane');

            if(!running) {
                if(balance < 10) return alert("Low Balance!");
                balance -= 10; updateBal(); running = true;
                let cur = 1.00;
                let crash = (Math.random() * 3 + 1.1).toFixed(2);
                btn.innerText = "CASH OUT"; btn.style.background = "#f59e0b";
                plane.style.display = "block";
                snd('click');

                timer = setInterval(() => {
                    cur += 0.04;
                    txt.innerText = cur.toFixed(2) + "x";
                    plane.style.transform = `translate(${(cur-1)*40}px, -${(cur-1)*40}px)`;
                    if(cur >= crash) {
                        clearInterval(timer); running = false;
                        txt.innerText = "CRASHED"; txt.style.color = "red";
                        btn.innerText = "BET ₹10"; btn.style.background = "#10b981";
                        plane.style.display = "none"; snd('lose');
                    }
                }, 100);
            } else {
                clearInterval(timer); running = false;
                let win = Math.floor(10 * parseFloat(txt.innerText));
                balance += win; updateBal();
                snd('win'); alert("Won ₹" + win);
                btn.innerText = "BET ₹10"; btn.style.background = "#10b981";
                plane.style.display = "none";
            }
        }

        // --- MINES LOGIC ---
        let minePos = 0;
        function resetMinesUI() {
            let g = document.getElementById('m-grid');
            g.innerHTML = '';
            for(let i=0; i<9; i++) g.innerHTML += `<div class="tile" onclick="checkMine(${i}, this)">?</div>`;
        }
        function startMines() {
            if(balance < 20) return alert("Low Balance!");
            balance -= 20; updateBal();
            minePos = Math.floor(Math.random() * 9);
            resetMinesUI();
            document.getElementById('m-status').innerText = "Game Active! Avoid Bomb.";
            snd('click');
        }
        function checkMine(i, el) {
            if(i === minePos) {
                el.innerText = "💣"; el.style.background = "red"; snd('lose'); alert("BOOM! Lost.");
                resetMinesUI();
            } else {
                el.innerText = "💎"; el.style.background = "green"; snd('win');
                balance += 30; updateBal();
            }
        }

        // --- DICE LOGIC ---
        function rollDice() {
            if(balance < 10) return;
            balance -= 10; updateBal();
            let d = document.getElementById('dice-val');
            snd('click');
            let res = Math.floor(Math.random() * 6) + 1;
            d.innerText = "🎲";
            setTimeout(() => {
                d.innerText = res;
                if(res > 3) { balance += 20; updateBal(); snd('win'); } else { snd('lose'); }
            }, 500);
        }

        // --- WHEEL LOGIC ---
        function spinWheel() {
            if(balance < 20) return;
            balance -= 20; updateBal();
            let w = document.getElementById('wheel-obj');
            let deg = Math.floor(Math.random() * 360) + 1000;
            w.style.transform = `rotate(${deg}px)`; // Logic for visual only
            snd('click');
            setTimeout(() => {
                let win = Math.random() > 0.5;
                if(win) { balance += 50; updateBal(); snd('win'); alert("Wheel Won ₹50!"); }
                else { snd('lose'); alert("Try Again!"); }
            }, 2000);
        }
    </script>
</body>
</html>
