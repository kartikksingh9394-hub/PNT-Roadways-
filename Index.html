<!DOCTYPE html>
<html>
<head>
  <title>PNT Transport</title>
  <style>
    body {font-family: Arial; text-align:center; background:#f5f5f5;}
    .box {background:white; padding:15px; margin:15px; border-radius:10px;}
    input {padding:10px; margin:5px; width:80%;}
    button {padding:10px; background:blue; color:white; border:none;}
  </style>
</head>
<body>

<h1>🚚 PNT Transport</h1>

<div class="box">
<h2>Book Truck</h2>

<input type="text" id="name" placeholder="Name"><br>
<input type="text" id="phone" placeholder="Phone"><br>
<input type="text" id="pickup" placeholder="Pickup"><br>
<input type="text" id="drop" placeholder="Drop"><br>

<button onclick="send()">Book Now</button>
</div>

<script>
function send(){
var n=document.getElementById("name").value;
var p=document.getElementById("phone").value;
var pi=document.getElementById("pickup").value;
var d=document.getElementById("drop").value;

var msg="Booking:%0AName:"+n+"%0APhone:"+p+"%0APickup:"+pi+"%0ADrop:"+d;

window.open("https://wa.me/919999999999?text="+msg);
}
</script>

</body>
</html>
